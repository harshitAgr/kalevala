[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "kalevala"
version = "0.1.0"
description = "Daily journal of Claude Code work, auto-generated via SessionEnd hook"
requires-python = ">=3.11"
dependencies = [
    "anthropic>=0.40.0",
    "pydantic>=2.0",
    "google-re2>=1.1",
]

[project.optional-dependencies]
dev = ["pytest>=7", "pytest-mock>=3", "pytest-cov>=4"]

[project.scripts]
kalevala = "kalevala.cli:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short"
